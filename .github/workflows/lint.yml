name: Lint

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run lint
        working-directory: frontend
        run: bun run lint
