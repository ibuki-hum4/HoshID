name: Docker Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: runner
            suffix: ""
          - target: migrator
            suffix: "-migrate"
          - target: jwk-rotator
            suffix: "-jwk-rotator"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hoshid-frontend:${{ github.ref_name }}${{ matrix.suffix }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hoshid-frontend:latest${{ matrix.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
