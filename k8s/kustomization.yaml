apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hoshid

# 注意: Secret (hoshid-secrets) はこの kustomization に含まれない。
# `kubectl apply -k k8s/` の前に、K8S_DEPLOYMENT.md の手順に従って
# `kubectl create secret generic hoshid-secrets -n hoshid --from-literal=...`
# で作成しておくこと（k8s/secret.example.yaml はキー一覧の参考用）。
resources:
  - namespace.yaml
  - configmap.yaml
  - db/service.yaml
  - db/statefulset.yaml
  - frontend/serviceaccount.yaml
  - frontend/service.yaml
  - frontend/deployment.yaml
  - frontend/ingress.yaml
  - frontend/migration-job.yaml

images:
  - name: hoshid/frontend
    newTag: latest

commonLabels:
  app.kubernetes.io/name: hoshid
  app.kubernetes.io/part-of: hoshid
  app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  deployment.date: "2026-06-02"
