apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: hoshid
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: frontend-sa
      containers:
        - name: prisma-migrate
          # standalone ランタイムイメージには Prisma CLI が含まれないため、
          # Dockerfile の migrator ステージからビルドした専用イメージを使用する
          image: hoshid/frontend:migrate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hoshid-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      restartPolicy: Never
