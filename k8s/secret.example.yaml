# hoshid-secrets の参考フォーマット（kustomization.yaml の resources には含めない）。
#
# このファイルはキー一覧と値の形式（特に OIDC_JWK_CURRENT のJSON構造）を示すための
# 参考用テンプレートであり、実際の Secret 値をリポジトリにコミットしないこと。
#
# 本番では K8S_DEPLOYMENT.md の手順に従い、`kubectl create secret generic` で
# 直接 Secret を作成する（このファイルを `kubectl apply -f` する運用は想定しない）。
# どうしても YAML 管理したい場合は、このファイルをコピーして値を埋めたうえで
# .gitignore 済みのパスに保存し、`kubectl apply -f` すること。
apiVersion: v1
kind: Secret
metadata:
  name: hoshid-secrets
  namespace: hoshid
type: Opaque
stringData:
  # === Better Auth / ダッシュボードJWT署名用シークレット（32文字以上のランダム文字列）===
  # 生成例: openssl rand -base64 32
  BETTER_AUTH_SECRET: "replace-with-32-bytes-or-more-random-value"

  # === PostgreSQL 接続情報（k8s/db/statefulset.yaml が参照）===
  POSTGRES_USER: "hoshid_user"
  POSTGRES_PASSWORD: "replace-with-strong-password"
  POSTGRES_DB: "hoshid"

  # === アプリのDB接続文字列（上記 POSTGRES_* と整合させること）===
  # マネージドDB（Cloud SQL/RDS等）を使う場合は sslmode=require とホスト名を変更する
  DATABASE_URL: "postgres://hoshid_user:replace-with-strong-password@db-service.hoshid.svc.cluster.local:5432/hoshid?sslmode=disable"

  # === OIDC JWT 署名鍵（必須）===
  # /api/auth/jwks (JWKS) と OIDC ID/アクセストークンの署名・検証に使用する。
  # 未設定の場合 JWKS が常に空集合になり、発行したトークンを誰も検証できない
  # （リプレイカ間/再起動間でも一致しないため、外部クライアントとの連携が壊れる）。
  # 生成方法: cd frontend && node scripts/generate-oidc-jwk.mjs
  OIDC_JWK_CURRENT: '{hoge}'

  # === 任意: 鍵ローテーション中の旧鍵（新鍵が安定するまで検証用に残す）===
  # OIDC_JWK_PREVIOUS: '{"id":"previous-kid","publicKey":"{...}","privateKey":"{...}","alg":"EdDSA","crv":"Ed25519","createdAt":"...","expiresAt":"..."}'

  # === SMTP（メールアドレス確認・パスワードリセットの送信に使用。実質必須）===
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "smtp-user"
  SMTP_PASS: "replace-with-smtp-password"
  SMTP_FROM: "noreply@hoshid.example.com"
  # 自己署名証明書を使う開発用メールキャッチャー以外では "true" のままにする
  SMTP_TLS_REJECT_UNAUTHORIZED: "true"

  # === 任意: Go API 等の外部クライアントを動的登録するブートストラップAPIの認証トークン ===
  # /api/admin/oauth/clients/go 呼び出し時に x-admin-bootstrap-token ヘッダで照合する。
  # 未設定の場合は当該APIが常に401を返す（使わない場合は設定不要）。
  # OIDC_ADMIN_BOOTSTRAP_TOKEN: "replace-with-admin-bootstrap-token"

  # === 任意: 信頼済みOIDCクライアントのシークレット（OIDC_GO_CLIENT_ID を使う場合）===
  # OIDC_GO_CLIENT_SECRET: "replace-with-go-client-secret"

  # === 任意: ソーシャルログイン（使う場合のみ設定）===
  # GOOGLE_CLIENT_SECRET: "replace-with-google-client-secret"
  # GITHUB_CLIENT_SECRET: "replace-with-github-client-secret"
