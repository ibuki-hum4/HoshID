apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: hoshid
  labels:
    app: db
spec:
  # StatefulSet 用のヘッドレスサービス（DNS: db-service.hoshid.svc.cluster.local）
  clusterIP: None
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
