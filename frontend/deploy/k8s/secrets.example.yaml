apiVersion: v1
kind: Secret
metadata:
  name: hoshid-frontend-secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/hoshid?schema=public
  NEXT_PUBLIC_APP_URL: https://auth.example.com
  BETTER_AUTH_SECRET: replace-with-32-bytes-or-more-random-value
  OIDC_ISSUER: https://auth.example.com
  OIDC_AUDIENCE: hoshid-go-api
  OIDC_ADMIN_BOOTSTRAP_TOKEN: replace-with-admin-bootstrap-token
  OIDC_GO_CLIENT_ID: hoshid-go-api
  OIDC_GO_CLIENT_SECRET: replace-with-go-client-secret
  OIDC_GO_REDIRECT_URLS: https://api.example.com/auth/callback
  OIDC_GO_SKIP_CONSENT: "true"
  OIDC_JWK_CURRENT: '{"id":"current-kid","publicKey":"{\"kty\":\"OKP\",\"crv\":\"Ed25519\",\"x\":\"...\"}","privateKey":"{\"kty\":\"OKP\",\"crv\":\"Ed25519\",\"d\":\"...\",\"x\":\"...\"}","createdAt":"2026-05-26T00:00:00.000Z","alg":"EdDSA","crv":"Ed25519"}'
  OIDC_JWK_PREVIOUS: '{"id":"previous-kid","publicKey":"{\"kty\":\"OKP\",\"crv\":\"Ed25519\",\"x\":\"...\"}","privateKey":"{\"kty\":\"OKP\",\"crv\":\"Ed25519\",\"d\":\"...\",\"x\":\"...\"}","createdAt":"2026-05-19T00:00:00.000Z","expiresAt":"2026-06-26T00:00:00.000Z","alg":"EdDSA","crv":"Ed25519"}'
