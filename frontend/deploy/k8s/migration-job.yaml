apiVersion: batch/v1
kind: Job
metadata:
  name: hoshid-prisma-migrate
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: hoshid-prisma-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/your-org/hoshid-frontend:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - npx prisma migrate deploy
          envFrom:
            - secretRef:
                name: hoshid-frontend-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PRISMA_HIDE_UPDATE_MESSAGE
              value: "1"
